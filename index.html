<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MCCNETWORLD</title>

<!-- ✅ OG 메타태그 -->
<meta property="og:title" content="MCCNETWORLD" />
<meta property="og:description" content="여기 글을 눌러 링크를 확인하세요." />
<meta property="og:url" content="https://mcc-cmd.github.io/mccnetworld/index.html" />
<meta property="og:image" content="https://mcc-cmd.github.io/mccnetworld/assets/og-mcc.png" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="MCCNETWORLD" />

<link rel="icon" href="./public/favicon.ico?v=2">
<link rel="icon" type="image/png" sizes="16x16"  href="favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32"  href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">

<style>
/* =========================================================
  [1] 기본 테마/레이아웃
========================================================= */
:root{
  --bg:#f6f8fb;
  --card:#ffffff;
  --line:#e5e9f2;
  --fg:#0b1220;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font:15px/1.6 system-ui,"Noto Sans KR",sans-serif;
}
.wrap{max-width:1200px;margin:0 auto;padding:18px}
.panel{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(16,24,40,.04);
}

/* =========================================================
  [2] 상단 헤더
========================================================= */
.hd{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px 220px; /* ✅ 좌우 공간 확보 (대략값) */
  border-bottom:1px solid var(--line);
}
.hd strong{font-weight:900;letter-spacing:.2px}

/* ✅ 왼쪽 다운로드 영역 */
.hd-left{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  gap:10px;
}

/* ✅ 안내문구(파일명 표시) */
.hd-hint{
  font-size:12px;
  font-weight:800;
  color:#64748b;
  white-space:nowrap;
}

/* ✅ 오른쪽 구비서류 버튼 */
.hd-actions{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:8px;
}

/* 버튼 공통 */
.hd-btn{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
  font-weight:800;
  font-size:12px;
  text-decoration:none;
  color:inherit;
  display:inline-flex;
  align-items:center;
  white-space:nowrap;
}
.hd-btn:hover{box-shadow:0 6px 18px rgba(2,6,23,.08)}
.cs-box{
  position:relative;
  display:inline-block;
}

.cs-menu{
  position:absolute;
  top:44px;
  right:0;
  min-width:120px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:0 8px 24px rgba(2,6,23,.12);
  padding:6px;
  z-index:2000;
}

.cs-menu button{
  width:100%;
  height:34px;
  border:none;
  background:#fff;
  border-radius:8px;
  text-align:left;
  padding:0 10px;
  cursor:pointer;
  font-weight:800;
  font-size:12px;
}

.cs-menu button:hover{
  background:#f3f6fb;
}

.cs-info{
  position:absolute;
  top:44px;
  right:132px;
  min-width:280px;
  max-width:360px;
  max-height:340px;
  overflow:auto;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:0 8px 24px rgba(2,6,23,.12);
  padding:12px 14px;
  z-index:2000;
}

.cs-info-title{
  font-weight:900;
  margin-bottom:10px;
}

.cs-info-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:6px 0;
  border-bottom:1px solid #eef2f7;
}

.cs-info-row:last-child{
  border-bottom:none;
}

.cs-info-name{
  font-weight:700;
  color:#334155;
}

.cs-info-num{
  font-weight:900;
  color:#0f172a;
  white-space:nowrap;
}

.hidden{
  display:none !important;
}

/* ✅ 기본 모바일 */
@media (max-width:720px){
  .wrap{
    padding:10px;
  }

  .hd{
    padding:14px 16px;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
  }

  .hd strong{
    width:100%;
    text-align:center;
  }

  .hd-left{
    position:static;
    transform:none;
    order:1;
    width:100%;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }

  .hd-actions{
    position:static;
    transform:none;
    order:2;
    width:100%;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
  }

  .hd-actions .hd-btn,
  .hd-left .hd-btn{
    width:100%;
    min-height:42px;
    justify-content:center;
  }

  .hd-hint{
    white-space:normal;
    text-align:center;
  }

  .stack{
    padding:14px;
  }

  .brand-grid{
    grid-template-columns:1fr;
    gap:12px;
  }
}

/* ✅ 중간 */
@media (max-width:600px){
  .hd-actions{
    grid-template-columns:repeat(2, 1fr);
  }
}

/* ✅ 작은 화면 */
@media (max-width:480px){
  .hd-actions{
    grid-template-columns:1fr;
  }
}
/* =========================================================
  [3] 섹션/탭/그리드
========================================================= */
.stack{padding:20px}
.section-title{font-weight:900;margin:0 0 12px 2px;font-size:16px}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab-btn{
  padding:8px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer
}
.tab-btn.active{
  background:#111827;
  color:#fff;
  border-color:#111827
}
.brand-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
  margin:6px 0 20px;
}

/* =========================================================
  [3-1] 가입서류: 통신사별 섹션
========================================================= */
.group-wrap{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin:6px 0 20px;
}
.group{
  border:1px solid var(--line);
  background:#fff;
  border-radius:18px;
  padding:14px 14px 16px;
  box-shadow:0 10px 30px rgba(16,24,40,.03);
}
.group-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}
.group-dot{
  width:10px;height:10px;border-radius:999px;
  background:var(--g-accent);
  box-shadow:0 0 0 4px rgba(0,0,0,.03);
}
.group-title{font-weight:900;letter-spacing:-0.2px}
.group-sub{
  margin-left:auto;
  font-size:12px;
  color:#64748b;
}
.group[data-carrier="sk"]{ --g-accent:#2563eb; }
.group[data-carrier="kt"]{ --g-accent:#0ea5e9; }
.group[data-carrier="uplus"]{ --g-accent:#8b5cf6; }
.group[data-carrier="device"]{ --g-accent:#111827; }
.group[data-carrier="prepaid"]{ --g-accent:#f59e0b; }

/* =========================================================
  [4] 카드(브랜드)
========================================================= */
.brand{
  position:relative;
  border-radius:18px;
  cursor:pointer;
  transition:transform .08s ease, box-shadow .15s ease, border-color .15s ease;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#fff,#fafcff);
  overflow:hidden;
}
.brand:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(2,6,23,.08)}
.logo-frame{
  width:180px;
  height:60px;
  margin:18px auto 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:transparent;
  border:0;
  border-radius:0;
  box-shadow:none;
  padding:0;
}
.logo-frame img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
}
.brand.long-name .name{font-size:15px;font-weight:800}
.cap{
  text-align:center;
  padding:0 18px 18px;
  color:#475467;
  font-size:12px;
}

/* =========================================================
  [5] 테마
========================================================= */
.theme-um{--chip-bg:#f3e8ff;--chip-fg:#3b0764;--chip-bd:#8b5cf6}
.theme-mm{--chip-bg:#e0f2fe;--chip-fg:#0b4a6f;--chip-bd:#38bdf8}
.theme-s7{--chip-bg:#d1fae5;--chip-fg:#064e3b;--chip-bd:#10b981}
.theme-pr{--chip-bg:#dbeafe;--chip-fg:#1e40af;--chip-bd:#60a5fa}

/* =========================
   구비서류 모달(확대 지원)
========================= */
.modal{
  position:fixed;
  inset:0;
  display:none;
  z-index:9999;
}
.modal[aria-hidden="false"]{ display:block; }
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.modal-panel{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(1200px, 96vw);
  height:min(760px, 92vh);
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  display:flex;
  flex-direction:column;
}
.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px solid var(--line);
}
.modal-body{
  flex:1;
  overflow:auto;
  background:#0b1220;
  padding:12px;
}
#docsImg{
  width:100%;
  height:auto;
  display:block;
  transform-origin: top left;
  cursor: zoom-in;
}
#docsImg.zoom{
  transform: scale(2.5);
  cursor: zoom-out;
}
.brand .name{ display:none; }

/* 워터마크 */
.group,
.required-grid-box{
  position: relative;
  overflow: hidden;
}

.group::after,
.required-grid-box::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("./assets/brand/mcc-watermark.png");
  background-repeat:no-repeat;
  background-position:right 18px bottom 14px;
  background-size:180px auto;
  opacity:0.10;
  pointer-events:none;
  z-index:0;
}

.group > *,
.required-grid-box > *{
  position:relative;
  z-index:1;
}
.group > *{position:relative;z-index:1}
/* =========================================================
  ✅ 동판 옆 빈칸에 "유심양식/동판양식" 2개 반반
========================================================= */
.form-duo-wrap{
  border:1px solid var(--line);
  background:linear-gradient(180deg,#fff,#fafcff);
  border-radius:18px;
  overflow:hidden;
  padding:14px;
  cursor:default;
  transition:transform .08s ease, box-shadow .15s ease, border-color .15s ease;
}
.form-duo-wrap:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(2,6,23,.08);
}
.form-duo{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.form-duo .form-half{
  border:1px solid var(--line);
  background:#fff;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:84px;
  cursor:pointer;
  transition:transform .08s ease, box-shadow .15s ease, border-color .15s ease;
}
.form-duo .form-half:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(2,6,23,.08);
}
.form-duo .form-text{
  font-weight:900;
  font-size:24px;
  letter-spacing:-0.2px;
  color:#0b1220;
}
@media (max-width:720px){
  .form-duo{grid-template-columns:1fr;}
  .form-duo .form-text{font-size:22px}
}

/* =========================================================
  ✅ 양식 팝업(복사 버튼 포함)
========================================================= */
.form-modal{
  position:fixed;
  inset:0;
  display:none;
  z-index:11000;
}
.form-modal[aria-hidden="false"]{display:block}
.form-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.form-panel{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(760px, calc(100% - 32px));
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.form-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px solid var(--line);
}
.form-head strong{font-weight:900}
.form-x{
  border:1px solid var(--line);
  background:#fff;
  border-radius:10px;
  padding:6px 10px;
  cursor:pointer;
  font-weight:800;
  font-size:12px;
}
.form-body{padding:14px;}
.form-textarea{
  width:100%;
  height:420px;
  resize:none;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  font:13px/1.6 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Noto Sans KR", monospace;
  white-space:pre;
  outline:none;
}
.form-actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  padding:0 14px 14px;
}
.form-btn{
  border:none;
  border-radius:10px;
  padding:8px 14px;
  background:#111827;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
.form-btn.ghost{
  background:#fff;
  color:#111827;
  border:1px solid var(--line);
}
.form-toast{
  margin-top:8px;
  font-size:12px;
  font-weight:800;
  color:#16a34a;
  display:none;
}
.form-toast.show{display:block}

.required-topbar{
  display:flex;
  justify-content:flex-end;
  margin:0 0 12px;
}

.required-kind-tabs{
  margin-bottom:0;
}

.required-grid-box{
  border:1px solid #cfd8e3;
  border-radius:18px;
  background:#f8fafc;
  overflow:hidden;
}

.required-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
}

.required-col{
  min-width:0;
}

.required-col + .required-col{
  border-left:1px solid #cfd8e3;
}

.required-col-head{
  height:46px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border-bottom:1px solid #cfd8e3;
  font-weight:900;
}

.required-col-body{
  padding:14px;
}

.required-dot{
  width:10px;
  height:10px;
  border-radius:999px;
  display:inline-block;
}

.required-col[data-carrier="uplus"] .required-dot{
  background:#8b5cf6;
}
.required-col[data-carrier="kt"] .required-dot{
  background:#0ea5e9;
}
.required-col[data-carrier="sk"] .required-dot{
  background:#2563eb;
}

.required-col-title{
  font-weight:900;
  letter-spacing:-0.2px;
}

.required-open-btn{
  width:100%;
  min-height:42px;
  justify-content:center;
  border-radius:12px;
  font-size:14px;
}

.required-modal-panel{
  width:min(1180px, 96vw);
  height:min(860px, 94vh);
}
.required-modal-body{
  flex:1;
  overflow:auto;
  background:#f8fafc;
  padding:14px;
}
.required-modal-toolbar{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:14px;
}
.required-brand-tabs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.required-chip{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
  font-weight:800;
  font-size:13px;
}
.required-chip.active{
  background:#111827;
  color:#fff;
  border-color:#111827;
}
.required-board{
  display:flex;
  flex-direction:column;
  gap:14px;
}
.required-table-wrap{
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  background:#fff;
}
.required-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
.required-table th,
.required-table td{
  border:1px solid #dbe2ea;
  padding:12px;
  vertical-align:top;
}
.required-table thead th{
  background:#0f172a;
  color:#fff;
  font-weight:900;
  text-align:center;
}
.required-table tbody th{
  width:170px;
  background:#0f172a;
  color:#fff;
  font-weight:900;
  text-align:center;
  vertical-align:middle !important;
}
.required-doc-lines{
  display:flex;
  flex-direction:column;
  gap:4px;
  white-space:pre-line;
}
.required-doc-lines .warn{
  color:#ef4444;
  font-weight:800;
}

/* 👇 여기부터 추가 */
.required-doc-lines .blue{
  color:#2563eb;
  font-weight:700;
}

.required-doc-lines .green{
  color:#16a34a;
  font-weight:700;
}

.required-doc-lines .orange{
  color:#f97316;
  font-weight:700;
}

.required-doc-lines .gray{
  color:#6b7280;
  font-weight:600;
}

.required-doc-lines .purple{
  color:#7c3aed;
  font-weight:700;
}

.required-images{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:flex-start;
}

.img-box{
  position:relative;
  flex:0 0 calc(50% - 5px);
  max-width:calc(50% - 5px);
  overflow:visible;
}

.required-images img{
  width:100%;
  height:auto;
  display:block;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  object-fit:contain;
  transition:0.2s;
}

.img-label{
  position:absolute;
  top:8px;
  left:8px;
  z-index:2;
  background:#f97316;
  color:#fff;
  font-weight:800;
  font-size:12px;
  line-height:1.2;
  padding:4px 8px;
  border-radius:6px;
  white-space:normal;
  max-width:calc(100% - 16px);
  word-break:keep-all;
}

.required-images img:hover{
  transform:scale(1.05);
}

@media (max-width:720px){
  .img-box{
    flex:0 0 100%;
    max-width:100%;
  }
}

@media (max-width:720px){
  .required-topbar{
    justify-content:flex-start;
  }

  .required-grid{
    grid-template-columns:1fr;
  }

  .required-col + .required-col{
    border-left:none;
    border-top:1px solid #cfd8e3;
  }

  .required-table{
    table-layout:auto;
  }

  .required-table tbody th{
    width:110px;
  }
}

</style>
</head>

<body>
<div class="wrap">
  <section class="panel">

    <!-- ✅ 헤더 완성본 -->
    <div class="hd">
      <strong>MCCNETWORLD</strong>

      <div class="hd-left">
        <a class="hd-btn" href="./assets/files/URL_260204.xlsx" download
           title="KT 요금제 구간표(엑셀) 다운로드">
          KT 요금제 구간표
        </a>
        <div class="hd-hint">※클릭 시 다운로드※</div>
      </div>

<div class="hd-actions">
  <div class="cs-box">
    <button type="button" id="csToggle" class="hd-btn">고객센터</button>

    <div id="csMenu" class="cs-menu hidden">
      <button type="button" data-net="sk">SK</button>
      <button type="button" data-net="kt">KT</button>
      <button type="button" data-net="lg">LG</button>
    </div>

    <div id="csInfo" class="cs-info hidden"></div>
  </div>
</div>
</div>

    <div class="stack">
<div class="section-title">구비 서류</div>
<div id="requiredDocsSection">
  <div class="required-topbar">
    <div class="tabs required-kind-tabs">
      <button class="tab-btn active" type="button" data-required-kind="adult">성인</button>
      <button class="tab-btn" type="button" data-required-kind="teen">청소년</button>
      <button class="tab-btn" type="button" data-required-kind="corp">법인/개인사업자</button>
    </div>
  </div>

  <div class="required-grid-box">
    <div class="required-grid">
      <div class="required-col" data-carrier="uplus">
        <div class="required-col-head">
          <span class="required-dot"></span>
          <span class="required-col-title">LG</span>

function buildBrandUrl(route, doc, age){
  if (!route || !route.carrier || !route.brand) return '#';
  const base = `brands/${route.carrier}/${route.brand}/index.html`;
  const abs  = new URL(base, location.href).href;

  const qs = new URLSearchParams();
  qs.set('mode','fill');
  qs.set('doc', doc || 'join');
  if ((doc || 'join') === 'join') qs.set('age', age || 'adult');

  return `${abs}?${qs.toString()}`;
}

function pickLogo(item){
  if (item.doc === 'join'){
    if (item.age === 'teen') return item.logoTeen || item.logoAdult || '';
    return item.logoAdult || item.logoTeen || '';
  }
  return item.logoAdult || item.logoTeen || '';
}

function card(item){
  const {theme, name, cap, doc, age} = item;
  const dataName = name.replace(/\(청소년\)/,'');
  const docAttr  = doc || 'join';
  const ageAttr  = (docAttr==='join' && age) ? ` data-age="${age}"` : '';
  const keyAttr  = item.brandKey ? ` data-brandkey="${item.brandKey}"` : '';
  const isLong   = name.length >= 9;
  const longCls  = isLong ? 'long-name' : '';

  const logo = pickLogo(item);
  const logoHtml = logo
    ? `<div class="logo-frame"><img src="${logo}" alt="${name} 로고"></div>`
    : '';

  return `
    <div class="brand ${theme} ${longCls}" data-name="${dataName}" data-doc="${docAttr}"${ageAttr}${keyAttr}>
      ${logoHtml}
      <div class="name">${name}</div>
      ${cap ? `<div class="cap">${cap}</div>` : ``}
    </div>
  `;
}

/* 카드 클릭 시 이동 */
function attachNavigateHandlers(scope){
  scope.querySelectorAll('.brand').forEach(cardEl=>{
    cardEl.addEventListener('click', (e)=>{
      e.preventDefault();
      e.stopPropagation();
if (cardEl.classList.contains('device-link')) {
  const raw = cardEl.getAttribute('data-url') || '';
  if (!raw) return;

  // ✅ 어떤 경로로 index.html을 열었든 항상 정상 이동 (로컬/깃헙 모두)
  const url = new URL(raw, location.href).href;
  location.href = url;
  return;
}


      if (cardEl.classList.contains('device-comingsoon')) return;

      const nm = (cardEl.getAttribute('data-name') || '').replace(/\s+/g, ' ').trim();
      const doc = cardEl.getAttribute('data-doc') || 'join';
      const age = cardEl.getAttribute('data-age') || '';
      // ✅ 선불: 전용 뷰어 페이지로 이동
      if (doc === 'prepaid') {
        const key = cardEl.getAttribute('data-brandkey') || '';
        if (key) location.href = `./brands/prepaid/index.html?brand=${encodeURIComponent(key)}`;
        return;
      }

      const route = BRAND_ROUTE[nm];
      if (!route) {
        console.warn('[route] 매핑 없음:', nm);
        return;
      }

      if (route.externalJoin && doc === 'join') {
        location.href = route.externalJoin;
        return;
      }
      if (route.external) {
        location.href = route.external;
        return;
      }

      const url = buildBrandUrl(route, doc, age);
      if (url !== '#') location.href = url;
    });
  });
}

function safeRender(listEl, items){
  try{
    listEl.innerHTML = (items && items.length)
      ? items.map(card).join('')
      : '<div style="opacity:.6">자료 없음</div>';
    attachNavigateHandlers(listEl);
  }catch(err){
    console.error('[render error]', err);
    listEl.innerHTML = '<div style="color:#b91c1c;font-weight:800">렌더 오류 – 콘솔을 확인하세요.</div>';
  }
}

function renderJoinGrouped(listEl, items){
  const specialItems = items.filter(x => x.special === true);
  const normalItems  = items.filter(x => !x.special);

  const groups = [
    { key:'uplus', title:'LG', sub:'' },
    { key:'kt',    title:'KT', sub:'' },
    { key:'sk',    title:'SK', sub:'' },
  ];

  const by = {
    uplus: normalItems.filter(x => x.carrier === 'uplus'),
    kt:    normalItems.filter(x => x.carrier === 'kt'),
    sk:    normalItems.filter(x => x.carrier === 'sk'),
  };

  const normalHTML = groups.map(g => {
    const arr = by[g.key] || [];
    if (!arr.length) return '';
    return `
      <section class="group" data-carrier="${g.key}">
        <div class="group-head">
          <span class="group-dot"></span>
          <span class="group-title">${g.title}</span>
          <span class="group-sub">${g.sub}</span>
        </div>
        <div class="brand-grid">
          ${arr.map(card).join('')}
        </div>
      </section>
    `;
  }).join('');

  const specialHTML = specialItems.length ? `
    <section class="group" data-carrier="kt">
      <div class="group-head">
        <span class="group-dot"></span>
        <span class="group-title">KT 링크</span>
        <span class="group-sub"></span>
      </div>
      <div class="brand-grid">
        ${specialItems.map(card).join('')}
        ${formDuoCard()}
      </div>
    </section>
  ` : '';

  listEl.innerHTML = normalHTML + specialHTML + deviceSectionHTML();
  attachNavigateHandlers(listEl);
}

function wireKindTabs(containerId, listId, dataObj){
  const container = document.getElementById(containerId);
  const list = document.getElementById(listId);

  container.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      container.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');

      JOIN_AGE = btn.dataset.target;
      renderJoinGrouped(list, (dataObj||{})[JOIN_AGE] || []);
      updateDeviceLogosByAge();
    });
  });

  container.querySelector('.tab-btn.active').click();
}

function wireTabs(containerId, listId, data){
  const container = document.getElementById(containerId);
  const list = document.getElementById(listId);

  container.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      container.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');

      const target = btn.dataset.target;
      const items = (data||[]).filter(d=>d.carrier===target);
      safeRender(list, items);
    });
  });

  container.querySelector('.tab-btn.active').click();
}

  function getCarrierPack(){
    return REQUIRED_DOCS_DATA?.[REQUIRED_KIND]?.[currentCarrier] || null;
  }

  function getBrandPack(){
    const carrierPack = getCarrierPack();
    if (!carrierPack) return null;
    return carrierPack.brands?.[currentBrand] || null;
  }

  function ensureBrandSelected(){
    const carrierPack = getCarrierPack();
    if (!carrierPack) {
      currentBrand = '';
      return;
    }
    const keys = Object.keys(carrierPack.brands || {});
    if (!keys.length) {
      currentBrand = '';
      return;
    }
    if (!carrierPack.brands[currentBrand]) currentBrand = keys[0];
  }

  function renderBrandTabs(){
    const carrierPack = getCarrierPack();
    if (!carrierPack) {
      brandTabsEl.innerHTML = '';
      return;
    }
    const html = Object.entries(carrierPack.brands || {}).map(([key, item]) => {
      const active = (key === currentBrand) ? 'active' : '';
      return `<button type="button" class="required-chip ${active}" data-required-brand="${key}">${item.label}</button>`;
    }).join('');
    brandTabsEl.innerHTML = html;
  }

  function renderBoard(){
    const brandPack = getBrandPack();
    if (!brandPack) {
      boardEl.innerHTML = `<div class="required-empty">등록된 구비서류가 없습니다.</div>`;
      titleEl.textContent = '구비서류';
      return;
    }

    const rows = Array.isArray(brandPack.rows) ? brandPack.rows : [];
    const rowHTML = rows.map(row => `
      <tr>
        <th scope="row">${row.type || ''}</th>
        <td>
          <div class="required-doc-lines">
            ${(row.lines || []).map(line => `<div>${line}</div>`).join('')}
          </div>
        </td>
      </tr>
    `).join('');

    const images = Array.isArray(brandPack.images) ? brandPack.images : [];
    const imageHTML = images.length
      ? `
<div class="required-images">
  ${images.map(item => {
    if (typeof item === 'string') {
      return `<img src="${item}" alt="">`;
    }

    return `
      <div class="img-box">
        <img src="${item.src}" alt="">
        ${item.label ? `<div class="img-label">${item.label}</div>` : ''}
      </div>
    `;
  }).join('')}
</div>
      `
      : '';

    const kindLabel = REQUIRED_KIND === 'adult'
      ? '성인'
      : REQUIRED_KIND === 'teen'
        ? '청소년'
        : '법인/개인사업자';

    boardEl.innerHTML = `
      <div class="required-table-wrap">
        <table class="required-table">
          <thead>
            <tr>
              <th style="width:170px">가입유형</th>
              <th>구비서류 항목</th>
            </tr>
          </thead>
          <tbody>
            ${rowHTML}
          </tbody>
        </table>
      </div>
      ${imageHTML}
    `;

    titleEl.textContent = `${kindLabel} · ${brandPack.label} 구비서류`;
  }

  function renderAll(){
    ensureBrandSelected();
    renderBrandTabs();
    renderBoard();
  }

  function openModal(carrierKey){
    currentCarrier = carrierKey || 'uplus';
    currentBrand = '';
    renderAll();
    modal.classList.add('open');
    modal.setAttribute('aria-hidden','false');
  }

  function closeModal(){
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden','true');
    boardEl.innerHTML = '';
    brandTabsEl.innerHTML = '';
  }

  document.querySelectorAll('[data-open-required]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      openModal(btn.dataset.openRequired);
    });
  });

  document.querySelectorAll('[data-required-kind]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('[data-required-kind]').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');
      REQUIRED_KIND = btn.dataset.requiredKind;
    });
  });

  brandTabsEl.addEventListener('click', (e)=>{
    const btn = e.target.closest('[data-required-brand]');
    if (!btn) return;
    currentBrand = btn.dataset.requiredBrand;
    renderAll();
  });

  closeBtn?.addEventListener('click', closeModal);

  modal?.addEventListener('click', (e)=>{
    const t = e.target;
    if (t && t.dataset && t.dataset.close === '1') closeModal();
  });

  window.addEventListener('keydown', (e)=>{
    if (e.key === 'Escape' && modal.getAttribute('aria-hidden') === 'false') closeModal();
  });
})();

function initCustomerCenter(){
  const csToggle = document.getElementById('csToggle');
  const csMenu = document.getElementById('csMenu');
  const csInfo = document.getElementById('csInfo');

  if (!csToggle || !csMenu || !csInfo) return;

  function renderCustomerCenterByNet(net){
    const data = CUSTOMER_CENTER_BY_NET[net];
    if (!data) return;

    csInfo.innerHTML = `
      <div class="cs-info-title">${data.title}</div>
      ${data.items.map(item => `
        <div class="cs-info-row">
          <div class="cs-info-name">${item.name}</div>
          <div class="cs-info-num">${item.number}</div>
        </div>
      `).join('')}
    `;

    csInfo.classList.remove('hidden');
  }

  csToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    csMenu.classList.toggle('hidden');
    if (!csMenu.classList.contains('hidden')) {
      csInfo.classList.add('hidden');
    }
  });

  csMenu.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-net]');
    if (!btn) return;

    const net = btn.dataset.net;
    renderCustomerCenterByNet(net);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.cs-box')) {
      csMenu.classList.add('hidden');
      csInfo.classList.add('hidden');
    }
  });
}
